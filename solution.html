<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scanfluence Journey Section</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="solution.css" />
</head>
<body>
  <main>
      <!-- ── Hero Section ──────────────────────────────────── -->
        <section class="hero-section container">
            <div class="hero-content">
                <p class="hero-subtitle">Dynamic QR-Powered</p>
                <h1 class="hero-title">Product Catalog</h1>
                <p class="hero-description">
                    Showcase all your products, enable cart and buying, and track every interaction
                    — all from one QR-enabled page. Everything your customer needs, in one scan.
                </p>
                <div class="hero-actions">
                    <button class="btn btn-gradient">Create Product QR</button>
                    <button class="btn btn-gradient">Book a Demo</button>
                </div>
            </div>
            <div class="hero-visuals">
                <div class="blob-shape"></div>
                <img src="/images/smart_site_banner.png" alt="Smart Site product catalog banner"
                    class="hero-banner-image">
            </div>
        </section>

  
  </main>
</body>
</html>
